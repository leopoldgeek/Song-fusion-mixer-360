<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}
.card{
margin:auto;
margin-top:80px;
width:300px;
padding:20px;
background:#111827;
border-radius:15px;
}
input{
margin:5px;
padding:8px;
width:80%;
}
button{
margin:5px;
padding:8px;
background:#38bdf8;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 Connexion</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="mot de passe">

<br>

<button onclick="signup()">Créer compte</button>
<button onclick="login()">Se connecter</button>

<p id="status"></p>

<br>

<button onclick="go('mixer.html')">🎧 Mixer</button>
<button onclick="go('cloud.html')">☁️ Cloud</button>
</div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

async function signup(){
 await supabase.auth.signUp({
  email:email.value,
  password:password.value
 });
 alert("Compte créé !");
}

async function login(){
 const {data,error}=await supabase.auth.signInWithPassword({
  email:email.value,
  password:password.value
 });

 if(error)return alert(error.message);

 localStorage.setItem("user",JSON.stringify(data.user));
 status.innerText="Connecté";
}

function go(p){window.location=p;}
</script>

</body>
</html>
