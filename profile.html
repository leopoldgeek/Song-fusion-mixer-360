<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Profil</title>
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
 background:#020617;
 color:white;
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}
.card{
 background:#111827;
 padding:30px;
 border-radius:15px;
 text-align:center;
 width:300px;
}
input{
 width:90%;
 padding:10px;
 margin:5px;
}
button{
 padding:10px;
 margin:5px;
 background:#38bdf8;
 border:none;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>👤 Compte</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="mot de passe">

<button onclick="signup()">Créer</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<br>

<button onclick="go('mixer.html')">🎧 Mixer</button>
<button onclick="go('cloud.html')">☁️ Cloud</button>
</div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

async function signup(){
 await supabase.auth.signUp({
  email:email.value,
  password:password.value
 });
 alert("Compte créé !");
}

async function login(){
 const {data,error}=await supabase.auth.signInWithPassword({
  email:email.value,
  password:password.value
 });
 if(error)return alert(error.message);

 localStorage.setItem("user",JSON.stringify(data.user));
 status.innerText="Connecté";
}

function go(p){window.location=p;}
</script>

</body>
</html>
