<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud</title>
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#020617;color:white;text-align:center;font-family:Arial;">

<h2>☁️ Cloud</h2>

<button onclick="go('mixer.html')">🎧 Mixer</button>
<button onclick="go('profile.html')">👤 Profil</button>

<br><br>

<button onclick="save()">💾 Sauvegarder le mix</button>

<h3>📚 Bibliothèque</h3>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let user = JSON.parse(localStorage.getItem("user"));

async function save(){
 if(!user) return alert("Connecte toi");

 const mix = JSON.parse(localStorage.getItem("mix") || "[]");

 const {error} = await supabase
  .from("mixes")
  .insert([{user_id:user.id, data:mix}]);

 if(error) return alert(error.message);

 alert("Mix sauvegardé !");
 load();
}

async function load(){
 const {data,error} = await supabase
  .from("mixes")
  .select("*");

 if(error) return alert(error.message);

 list.innerHTML = "";

 data.forEach(m=>{
  const div = document.createElement("div");
  div.innerText = "🎧 Mix";

  div.onclick = ()=>{
   m.data.forEach(s=>{
    new Audio(s.url).play();
   });
  };

  list.appendChild(div);
 });
}

function go(p){ window.location = p; }

load();
</script>

</body>
</html>
