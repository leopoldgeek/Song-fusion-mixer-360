<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cloud</title>
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
 background:#020617;
 color:white;
 text-align:center;
 font-family:Arial;
}
button{
 margin:5px;
 padding:8px;
 background:#38bdf8;
 border:none;
 cursor:pointer;
}
.item{
 background:#111827;
 margin:10px;
 padding:10px;
}
</style>
</head>

<body>

<h2>☁️ Cloud</h2>

<button onclick="go('mixer.html')">🎧</button>
<button onclick="go('profile.html')">👤</button>

<br>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<h3>📚 Bibliothèque</h3>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

async function upload(){
 const f=file.files[0];
 const name=Date.now()+f.name;

 await supabase.storage.from("songs").upload(name,f);

 const {data}=supabase.storage.from("songs").getPublicUrl(name);

 await supabase.from("sounds").insert([{
  name:f.name,
  url:data.publicUrl
 }]);

 alert("upload ok");
 load();
}

async function load(){
 const {data}=await supabase.from("sounds").select("*");

 list.innerHTML="";

 data.forEach(s=>{
  const div=document.createElement("div");
  div.className="item";
  div.innerText=s.name;

  div.onclick=()=>new Audio(s.url).play();

  list.appendChild(div);
 });
}

function go(p){window.location=p;}

load();
</script>

</body>
</html>
