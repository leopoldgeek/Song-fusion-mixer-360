<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mixer</title>
<link rel="icon" href="favicon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#020617;color:white;text-align:center;font-family:Arial;">

<h2>🎧 Mixer</h2>

<button onclick="go('profile.html')">👤</button>
<button onclick="go('cloud.html')">☁️</button>

<br><br>

<input type="file" id="file">
<button onclick="addLocal()">📂 Import PC</button>
<button onclick="loadCloud()">☁️ Import Cloud</button>

<div id="list"></div>

<br>

<button onclick="saveMix()">💾 Save Mix</button>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let tracks = [];

function addLocal(){
 const input = document.createElement("input");
 input.type = "file";

 input.onchange = e=>{
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  const audio = new Audio(url);

  const btn = document.createElement("button");
  btn.innerText = "▶ " + file.name;

  btn.onclick = ()=>audio.play();

  list.appendChild(btn);

  tracks.push(url);
 };

 input.click();
}

async function loadCloud(){
 const {data} = await supabase.from("sounds").select("*");

 data.forEach(s=>{
  const btn = document.createElement("button");
  btn.innerText = "▶ " + s.name;

  btn.onclick = ()=>new Audio(s.url).play();

  list.appendChild(btn);

  tracks.push(s.url);
 });
}

async function saveMix(){
 const user = JSON.parse(localStorage.getItem("user"));
 if(!user) return alert("login requis");

 await supabase.from("mixes").insert([{
  user_id: user.id,
  data: tracks
 }]);

 alert("Mix sauvegardé !");
}

function go(p){ window.location = p; }
</script>

</body>
</html>
