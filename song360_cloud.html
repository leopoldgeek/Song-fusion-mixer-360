<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
button{margin:10px;padding:8px;}
#list{margin-top:20px;}
</style>
</head>

<body>

<h2>☁️ Cloud</h2>

<button onclick="goMixer()">🎧 Mixer</button>

<br><br>

<input type="file" id="fileInput">

<br>

<button onclick="upload()">⬆ Upload</button>

<div id="list"></div>

<script>
const supabase = supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let files=[];

async function upload(){
 const file=fileInput.files[0];
 if(!file)return alert("no file");

 const name=Date.now()+"_"+file.name;

 const {error}=await supabase.storage
 .from("songs")
 .upload(name,file);

 if(error)return alert(error.message);

 const {data}=supabase.storage
 .from("songs")
 .getPublicUrl(name);

 files.push(data.publicUrl);

 render();
}

function render(){
 list.innerHTML="";
 files.forEach(f=>{
 const div=document.createElement("div");
 div.innerText="🎵 audio";
 div.onclick=()=>new Audio(f).play();
 list.appendChild(div);
 });
}

function goMixer(){
 window.location.href="fusion_mixer.html";
}
</script>

</body>
</html>
