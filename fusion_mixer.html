<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fusion Mixer</title>

<style>
body{margin:0;background:#020617;color:white;text-align:center;font-family:Arial;}
#container{position:relative;width:400px;height:400px;margin:auto;}
#center{position:absolute;top:160px;left:160px;width:80px;height:80px;border-radius:50%;background:orange;}
.bubble{position:absolute;width:60px;height:60px;border-radius:50%;background:#38bdf8;display:flex;align-items:center;justify-content:center;}
button{margin:10px;padding:8px;}
</style>
</head>

<body>

<h2>🎧 Mixer</h2>

<button onclick="goCloud()">☁️ Cloud</button>

<br><br>

<input type="file" id="fileInput" accept="audio/*">

<div id="container">
<div id="center"></div>
</div>

<script>
let bubbles=[];

fileInput.onchange=(e)=>{
 const file=e.target.files[0];
 const url=URL.createObjectURL(file);
 const audio=new Audio(url);
 audio.loop=true;

 const el=document.createElement("div");
 el.className="bubble";
 el.innerText="🎵";

 container.appendChild(el);

 bubbles.push({el,audio,x:200,y:200});

 update();
};

function update(){
 bubbles.forEach((b,i)=>{
 b.x=80+i*70;
 b.y=180;
 b.el.style.left=b.x+"px";
 b.el.style.top=b.y+"px";
 });
}

function goCloud(){
 localStorage.setItem("mix",JSON.stringify(bubbles.length));
 window.location.href="song360_cloud.html";
}
</script>

</body>
</html>
