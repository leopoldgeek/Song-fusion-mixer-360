<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song360 Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
 margin:0;
 background:#020617;
 color:white;
 font-family:Arial;
 text-align:center;
}

button,input{
 margin:5px;
 padding:6px;
}

#library{
 margin-top:20px;
}

.item{
 background:#111827;
 margin:8px auto;
 padding:10px;
 width:250px;
 border-radius:8px;
 cursor:pointer;
}
</style>
</head>

<body>

<h2>☁️ Song360 Cloud</h2>

<button onclick="goMixer()">🎧 Mixer</button>

<br><br>

<input type="file" id="fileInput" accept="audio/*">

<br>

<button onclick="saveMix()">💾 Save Mix</button>

<p id="status">Non connecté</p>

<h3>📚 Bibliothèque</h3>
<div id="library"></div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let user=null;
let mix=JSON.parse(localStorage.getItem("mix_temp")||"[]");

/* AUTH SIMPLE */
supabase.auth.getSession().then(({data})=>{
 user=data.session?.user;
 status.innerText=user?"Connecté":"Non connecté";
 if(user)loadLibrary();
});

/* UPLOAD AUDIO */
fileInput.addEventListener("change",async e=>{
 const file=e.target.files[0];
 if(!file)return;

 const path=Date.now()+"_"+file.name;

 const {error}=await supabase.storage
 .from("songs")
 .upload(path,file);

 if(error)return alert(error.message);

 const {data}=supabase.storage
 .from("songs")
 .getPublicUrl(path);

 mix.push({url:data.publicUrl,name:file.name});

 alert("audio uploadé");
});

/* SAVE MIX */
async function saveMix(){
 if(!user)return alert("connecte toi");

 const {error}=await supabase
 .from("mixes")
 .insert([{
 user_id:user.id,
 is_public:true,
 data:mix
 }]);

 if(error)return alert(error.message);

 alert("Mix sauvegardé !");
 loadLibrary();
}

/* LIBRARY */
async function loadLibrary(){
 const {data}=await supabase
 .from("mixes")
 .select("*")
 .eq("user_id",user.id);

 library.innerHTML="";

 data.forEach(m=>{
 const div=document.createElement("div");
 div.className="item";
 div.innerText="🎧 Mix";

 div.onclick=()=>{
 localStorage.setItem("mix_temp",JSON.stringify(m.data));
 alert("Mix chargé");
 };

 library.appendChild(div);
 });
}

/* NAV */
function goMixer(){
 window.location.href="fusion_mixer.html";
}
</script>

</body>
</html>
