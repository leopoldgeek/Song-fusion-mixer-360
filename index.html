<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song360 Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial;
    background: radial-gradient(circle, #020617, #000);
    color: white;
    text-align: center;
}

#auth {
    position: absolute;
    top: 10px;
    left: 10px;
}

input {
    margin: 4px;
    padding: 5px;
}

button {
    padding: 6px 10px;
    margin: 3px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#status {
    margin-top: 10px;
    font-size: 12px;
    color: #38bdf8;
}
</style>
</head>

<body>

<h2>🎧 Song360 Cloud</h2>

<div id="auth">
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">

    <br>

    <button onclick="signUp()">Créer compte</button>
    <button onclick="signIn()">Se connecter</button>
    <button onclick="logout()">Logout</button>

    <div id="status">Non connecté</div>
</div>

<script>
/* =========================
   SUPABASE INIT
========================= */
const supabase = window.supabase.createClient(
  "https://hnpfyxnodhthzxvwfnvl.supabase.co",
  "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let user = null;

/* =========================
   AUTH
========================= */
async function signUp() {
    const email = emailInput().value;
    const password = passInput().value;

    const { data, error } = await supabase.auth.signUp({
        email,
        password
    });

    console.log(data, error);
    alert("Compte créé (check email si confirmé)");
}

async function signIn() {
    const email = emailInput().value;
    const password = passInput().value;

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if (error) return alert(error.message);

    user = data.user;
    updateStatus();
}

async function logout() {
    await supabase.auth.signOut();
    user = null;
    updateStatus();
}

/* =========================
   SESSION CHECK
========================= */
supabase.auth.getSession().then(({ data }) => {
    user = data.session?.user || null;
    updateStatus();
});

/* =========================
   STATUS UI
========================= */
function updateStatus() {
    document.getElementById("status").innerText =
        user ? "Connecté: " + user.email : "Non connecté";
}

/* =========================
   MIX CLOUD SAVE
========================= */
async function saveMixCloud(mixData) {
    if (!user) return alert("connecte toi d'abord");

    await supabase.from("mixes").insert([
        {
            user_id: user.id,
            data: mixData
        }
    ]);

    alert("Mix sauvegardé ☁️");
}

/* =========================
   LOAD MIX CLOUD
========================= */
async function loadMyMixes() {
    if (!user) return;

    const { data } = await supabase
        .from("mixes")
        .select("*")
        .eq("user_id", user.id);

    console.log("mes mixes:", data);
}

/* =========================
   HELPERS
========================= */
function emailInput() {
    return document.getElementById("email");
}

function passInput() {
    return document.getElementById("password");
}
</script>

</body>
</html>
