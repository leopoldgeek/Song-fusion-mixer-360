<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song360 Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{background:#020617;color:white;text-align:center;font-family:Arial;}
input,button{margin:5px;padding:6px;}
</style>
</head>

<body>

<h2>☁️ Song360 Cloud</h2>

<input id="email" placeholder="email">
<input id="password" type="password"><br>

<button onclick="signUp()">Créer</button>
<button onclick="signIn()">Login</button>
<button onclick="saveMix(true)">🌐 Public</button>
<button onclick="saveMix(false)">🔒 Privé</button>

<div id="status"></div>

<script>
const supabase = window.supabase.createClient(
 "https://hnpfyxnodhthzxvwfnvl.supabase.co",
 "sb_publishable_pJJjozADUUOFcBp3uut0dg_yH2SVm8V"
);

let user=null;
let mix=JSON.parse(localStorage.getItem("mix_temp")||"[]");

/* AUTH */
async function signUp(){
 await supabase.auth.signUp({
  email:email.value,
  password:password.value
 });
 alert("Compte créé");
}

async function signIn(){
 const {data,error}=await supabase.auth.signInWithPassword({
  email:email.value,
  password:password.value
 });
 if(error)return alert(error.message);
 user=data.user;
 updateStatus();
}

function updateStatus(){
 status.innerText=user?"Connecté: "+user.email:"Non connecté";
}

/* SAVE */
async function saveMix(isPublic){
 if(!user)return alert("connecte toi");

 const {error}=await supabase
  .from("mixes")
  .insert([{
   user_id:user.id,
   is_public:isPublic,
   data:mix
  }]);

 if(error)return alert(error.message);

 alert("Mix sauvegardé !");
}
</script>

</body>
</html>
