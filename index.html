<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="favicon.png" type="image/png">
<meta charset="UTF-8">
<title>Song Fusion Mixer 360 PRO</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #020617, #000);
    color: white;
    font-family: "Segoe UI", sans-serif;
    text-align: center;
}

h1 {
    margin: 15px;
    font-weight: 300;
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
}

#container {
    position: relative;
    width: 600px;
    height: 500px;
    margin: auto;
}

#center {
    position: absolute;
    top: 215px;
    left: 265px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #fb923c, #ea580c);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    box-shadow: 0 0 30px #f97316;
    transition: 0.2s;
}

.bubble {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #38bdf8, #0ea5e9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 0 0 15px #38bdf8;
}

#controls {
    width: 600px;
    margin: auto;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.slider {
    width: 80px;
}

.eq {
    width: 80px;
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
}

button {
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
}

#visualizer {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🎧 Song Fusion Mixer 360 PRO</h1>

<input type="file" id="fileInput" accept="audio/*">

<div id="container">
    <div id="center">CORE</div>
</div>

<canvas id="visualizer" width="600" height="120"></canvas>

<div id="controls">
    <input type="range" id="bass" class="eq" min="-30" max="30" value="0">
    <input type="range" id="mid" class="eq" min="-30" max="30" value="0">
    <input type="range" id="treble" class="eq" min="-30" max="30" value="0">

    <button onclick="saveMix()">💾 Save</button>
    <button onclick="shareMix()">🌐 Share</button>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const container = document.getElementById("container");
const center = document.getElementById("center");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();

let bubbles = [];
let audioNodes = [];
let mixState = [];

let bassFilter = audioCtx.createBiquadFilter();
bassFilter.type = "lowshelf";

let midFilter = audioCtx.createBiquadFilter();
midFilter.type = "peaking";

let trebleFilter = audioCtx.createBiquadFilter();
trebleFilter.type = "highshelf";

bassFilter.frequency.value = 100;
midFilter.frequency.value = 1000;
trebleFilter.frequency.value = 3000;

/* EQ CONTROLS */
document.getElementById("bass").oninput = e => {
    bassFilter.gain.value = e.target.value;
};

document.getElementById("mid").oninput = e => {
    midFilter.gain.value = e.target.value;
};

document.getElementById("treble").oninput = e => {
    trebleFilter.gain.value = e.target.value;
};

/* FILE LOAD */
fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const audio = new Audio(URL.createObjectURL(file));
    audio.loop = true;

    let source = audioCtx.createMediaElementSource(audio);

    source
        .connect(bassFilter)
        .connect(midFilter)
        .connect(trebleFilter)
        .connect(analyser)
        .connect(audioCtx.destination);

    analyser.fftSize = 256;

    audio.play();
    center.innerText = "CORE 🔊";

    createBubble(audio);

    startVisualizer();
});

/* BUBBLE */
function createBubble(audio) {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = bubbles.length + 1;

    container.appendChild(bubble);
    bubbles.push(bubble);

    let state = {
        volume: audio.volume
    };

    mixState.push(state);

    makeDraggable(bubble, audio, state);
    updatePositions();
}

/* POSITION */
function updatePositions() {
    const radius = 200;
    const step = (Math.PI * 2) / bubbles.length;

    bubbles.forEach((b, i) => {
        let angle = i * step;
        b.style.left = 265 + Math.cos(angle) * radius + "px";
        b.style.top = 215 + Math.sin(angle) * radius + "px";
    });
}

/* DRAG */
function makeDraggable(el, audio, state) {
    let drag = false;

    el.onmousedown = () => drag = true;

    document.onmousemove = (e) => {
        if (!drag) return;
        el.style.left = e.pageX + "px";
        el.style.top = e.pageY + "px";
    };

    document.onmouseup = () => {
        drag = false;
        audio.play();
    };
}

/* VISUALIZER */
function startVisualizer() {
    let data = new Uint8Array(analyser.frequencyBinCount);

    function draw() {
        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(data);

        ctx.clearRect(0,0,600,120);

        for (let i=0;i<data.length;i++) {
            let h = data[i];
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(i*5, 120-h, 3, h);
        }
    }

    draw();
}

/* SAVE */
function saveMix() {
    const data = {
        eq: {
            bass: bassFilter.gain.value,
            mid: midFilter.gain.value,
            treble: trebleFilter.gain.value
        },
        bubbles: bubbles.length
    };

    localStorage.setItem("song360_mix", JSON.stringify(data));

    alert("Mix sauvegardé 💾");
}

/* SHARE */
function shareMix() {
    const data = {
        b: bassFilter.gain.value,
        m: midFilter.gain.value,
        t: trebleFilter.gain.value
    };

    const encoded = btoa(JSON.stringify(data));
    const url = window.location.origin + "?mix=" + encoded;

    navigator.clipboard.writeText(url);

    alert("Lien copié 🌐");
}

/* LOAD SHARE */
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const mix = params.get("mix");

    if (mix) {
        const data = JSON.parse(atob(mix));

        bassFilter.gain.value = data.b;
        midFilter.gain.value = data.m;
        trebleFilter.gain.value = data.t;

        document.getElementById("bass").value = data.b;
        document.getElementById("mid").value = data.m;
        document.getElementById("treble").value = data.t;
    }
};
</script>

</body>
</html>
