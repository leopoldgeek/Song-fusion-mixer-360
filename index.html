<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song 360 Ableton Web Core</title>

<style>
body {
  margin: 0;
  background: #05070f;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* TOP */
#topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0f1629;
}

button {
  background: #2b6cff;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* MAIN */
#canvas {
  height: calc(100vh - 160px);
  position: relative;
}

/* TRACKS */
.track {
  position: absolute;
  width: 140px;
  height: 80px;
  background: #1b2a4a;
  border-radius: 10px;
  padding: 5px;
  cursor: grab;
}

.track span {
  font-size: 12px;
}

/* BOTTOM MIXER */
#mixer {
  height: 80px;
  background: #0f1629;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 20px;
}

/* EQ */
.eq {
  display: flex;
  flex-direction: column;
  font-size: 12px;
}

input[type=range] {
  width: 120px;
}
</style>
</head>

<body>

<div id="topbar">
  <div>
    <button onclick="file.click()">➕ Add Audio</button>
    <button onclick="playAll()">▶ Play</button>
    <button onclick="pauseAll()">⏸ Pause</button>
  </div>
  <div>🎧 SONG 360 – ABLETON WEB</div>
</div>

<div id="canvas"></div>

<div id="mixer">
  <div class="eq">
    Bass
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('bass', this.value)">
  </div>

  <div class="eq">
    Mid
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('mid', this.value)">
  </div>

  <div class="eq">
    Treble
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('treble', this.value)">
  </div>

  <div class="eq">
    BPM Sync
    <input type="range" min="60" max="180" value="120" oninput="setBPM(this.value)">
  </div>

  <div class="eq">
    Pitch
    <input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setPitch(this.value)">
  </div>
</div>

<input type="file" id="file" multiple hidden>

<script>

/* =========================
   AUDIO ENGINE
========================= */

const ctx = new AudioContext();

/* MASTER CHAIN */
const master = ctx.createGain();
master.gain.value = 0.9;

/* limiter */
const comp = ctx.createDynamicsCompressor();
comp.threshold.value = -18;
comp.ratio.value = 10;

master.connect(comp);
comp.connect(ctx.destination);

/* FX NODES */
const bass = ctx.createBiquadFilter();
bass.type = "lowshelf";
bass.frequency.value = 200;

const mid = ctx.createBiquadFilter();
mid.type = "peaking";
mid.frequency.value = 1000;
mid.Q.value = 1;

const treble = ctx.createBiquadFilter();
treble.type = "highshelf";
treble.frequency.value = 3000;

/* CHAIN EQ */
master.connect(bass);
bass.connect(mid);
mid.connect(treble);
treble.connect(comp);

/* DATA */
let tracks = [];

/* BPM + PITCH */
let BPM = 120;
let pitch = 1;

/* FILE INPUT */
file.onchange = async e=>{
  for(let f of e.target.files){
    let buffer = await f.arrayBuffer();
    let audio = await ctx.decodeAudioData(buffer);
    createTrack(f.name, audio);
  }
};

/* =========================
   TRACK
========================= */

function createTrack(name, buffer){

  let div = document.createElement("div");
  div.className = "track";
  div.innerHTML = `<span>${name}</span>`;

  div.style.left = Math.random()*300 + "px";
  div.style.top = Math.random()*200 + "px";

  let source = null;

  div.onmousedown = () => {
    let move = e=>{
      div.style.left = e.pageX + "px";
      div.style.top = e.pageY + "px";
    };
    document.onmousemove = move;
    document.onmouseup = ()=> document.onmousemove = null;
  };

  canvas.appendChild(div);

  tracks.push({buffer, div});
}

/* =========================
   PLAY (BPM SYNC + PITCH)
========================= */

function playAll(){
  ctx.resume();

  let start = ctx.currentTime + 0.1;

  let beatTime = 60 / BPM;

  tracks.forEach((t,i)=>{

    let src = ctx.createBufferSource();
    src.buffer = t.buffer;

    src.playbackRate.value = pitch;

    let g = ctx.createGain();
    g.gain.value = 0.8;

    src.connect(g);
    g.connect(master);

    src.start(start + i * beatTime);
  });
}

/* =========================
   CONTROLS
========================= */

function pauseAll(){
  ctx.suspend();
}

function setBPM(v){
  BPM = Number(v);
}

function setPitch(v){
  pitch = Number(v);
}

function setEQ(type, value){
  value = Number(value);

  if(type === "bass") bass.gain.value = value;
  if(type === "mid") mid.gain.value = value;
  if(type === "treble") treble.gain.value = value;
}

</script>

</body>
</html>
