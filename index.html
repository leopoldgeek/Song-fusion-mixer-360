<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mixer Audio</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100vh;
      background: #111;
      color: #f5f5f5;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    .controls-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      background: #2b6cb0;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      background: #555;
      cursor: default;
    }
    .bubble-container {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #333;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
      overflow-y: auto;
      background: radial-gradient(circle at top left, #1f2933, #050608);
    }
    .bubble {
      min-width: 140px;
      max-width: 180px;
      padding: 10px;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.5);
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      user-select: none;
      cursor: grab;
    }
    .bubble.dragging {
      opacity: 0.4;
    }
    .core-highlight {
      border: 2px solid #00ff99 !important;
      box-shadow: 0 0 10px #00ff99;
    }
    .bubble-title {
      font-weight: 600;
      text-align: center;
    }
    .volume-row {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .volume-row label {
      font-size: 11px;
      opacity: 0.8;
    }
    .side-panel {
      width: 260px;
      border-left: 1px solid #333;
      padding: 16px;
      box-sizing: border-box;
      background: #050608;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-section {
      border-radius: 8px;
      border: 1px solid #333;
      padding: 10px;
      background: #111827;
    }
    .panel-section h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca3af;
    }
    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="main">
    <header><h1>Mixer Audio</h1></header>

    <div class="controls-row">
      <div>
        <label>Son de base :</label>
        <input type="file" id="baseSound" accept="audio/*">
      </div>

      <div>
        <label>Ajouter MP3 :</label>
        <input type="file" id="addTrack" accept="audio/*" multiple>
      </div>

      <div>
        <button id="playPauseBtn" disabled>Lecture</button>
        <button id="recordBtn" disabled>Enregistrer</button>
        <button id="exportBtn" disabled>Exporter</button>
      </div>
    </div>

    <div class="bubble-container" id="bubbleContainer"></div>
  </div>

  <aside class="side-panel">
    <div class="panel-section">
      <h2>Mix global</h2>
      <label>Volume général</label>
      <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="1">
      <div class="status" id="playStatus">Aucun son chargé.</div>
    </div>

    <div class="panel-section">
      <h2>Effets audio</h2>
      <select id="effectSelect" size="10">
        <option>Reverb légère</option>
        <option>Reverb grande salle</option>
        <option>Echo court</option>
        <option>Echo long</option>
        <option>Chorus</option>
        <option>Flanger</option>
        <option>Phaser</option>
        <option>Distorsion douce</option>
        <option>Distorsion forte</option>
        <option>Filtre passe-bas</option>
        <option>Filtre passe-haut</option>
        <option>Compresseur</option>
        <option>Pitch +1 ton</option>
        <option>Pitch -1 ton</option>
        <option>Stéréo élargie</option>
      </select>
    </div>

    <div class="panel-section">
      <h2>Enregistrement</h2>
      <div class="status" id="recordStatus">En attente.</div>
    </div>
  </aside>

<script>
let audioCtx = null;
let masterGain = null;
let destinationNode = null;
let mediaRecorder = null;
let recordedChunks = [];

let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

const tracks = []; // {id, name, buffer, gainNode, source, volume, isBase, isMerged}
let draggedTrack = null;

const baseInput = document.getElementById("baseSound");
const addInput = document.getElementById("addTrack");
const bubbleContainer = document.getElementById("bubbleContainer");
const playPauseBtn = document.getElementById("playPauseBtn");
const recordBtn = document.getElementById("recordBtn");
const exportBtn = document.getElementById("exportBtn");
const masterVolume = document.getElementById("masterVolume");
const playStatus = document.getElementById("playStatus");
const recordStatus = document.getElementById("recordStatus");

function ensureAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume.value;

    destinationNode = audioCtx.createMediaStreamDestination();
    masterGain.connect(audioCtx.destination);
    masterGain.connect(destinationNode);

    mediaRecorder = new MediaRecorder(destinationNode.stream);
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      if (recordedChunks.length) exportBtn.disabled = false;
      recordStatus.textContent = "Enregistrement terminé.";
    };
  }
}

masterVolume.oninput = () => {
  if (masterGain) masterGain.gain.value = masterVolume.value;
};

async function fileToBuffer(file) {
  ensureAudioContext();
  const arrayBuffer = await file.arrayBuffer();
  return await audioCtx.decodeAudioData(arrayBuffer);
}

function enableDrag(bubble, track) {
  bubble.draggable = true;

  bubble.addEventListener("dragstart", () => {
    draggedTrack = track;
    bubble.classList.add("dragging");
  });

  bubble.addEventListener("dragend", () => {
    bubble.classList.remove("dragging");
    draggedTrack = null;
  });
}

function enableCoreDrop(coreBubble) {
  coreBubble.addEventListener("dragover", (e) => {
    e.preventDefault();
    coreBubble.classList.add("core-highlight");
  });

  coreBubble.addEventListener("dragleave", () => {
    coreBubble.classList.remove("core-highlight");
  });

  coreBubble.addEventListener("drop", () => {
    coreBubble.classList.remove("core-highlight");
    if (!draggedTrack || draggedTrack.isBase || draggedTrack.isMerged) return;

    draggedTrack.isMerged = true;
    const bubble = document.getElementById("bubble-" + draggedTrack.id);
    if (bubble) bubble.remove();

    alert("Le son '" + draggedTrack.name + "' a été fusionné dans CORE.");
  });
}

function createBubble(track) {
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.id = "bubble-" + track.id;

  const title = document.createElement("div");
  title.className = "bubble-title";
  title.textContent = track.isBase ? "CORE" : track.name;

  const volumeRow = document.createElement("div");
  volumeRow.className = "volume-row";

  const label = document.createElement("label");
  label.textContent = "Volume";

  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = 0;
  slider.max = 1;
  slider.step = 0.01;
  slider.value = track.volume;

  slider.oninput = () => {
    track.volume = slider.value;
    if (track.gainNode) track.gainNode.gain.value = track.volume;
  };

  volumeRow.appendChild(label);
  volumeRow.appendChild(slider);

  bubble.appendChild(title);
  bubble.appendChild(volumeRow);

  bubbleContainer.appendChild(bubble);

  if (track.isBase) {
    enableCoreDrop(bubble);
  } else {
    enableDrag(bubble, track);
  }
}

async function addTrack(file, isBase = false) {
  const buffer = await fileToBuffer(file);

  const track = {
    id: Math.random().toString(36).slice(2),
    name: file.name,
    buffer,
    gainNode: null,
    source: null,
    volume: 1,
    isBase,
    isMerged: isBase // CORE est toujours dans le mix
  };

  tracks.push(track);
  createBubble(track);

  playPauseBtn.disabled = false;
  recordBtn.disabled = false;
  playStatus.textContent = "Pistes chargées.";
}

baseInput.onchange = e => {
  if (e.target.files[0]) addTrack(e.target.files[0], true);
};

addInput.onchange = e => {
  [...e.target.files].forEach(f => addTrack(f, false));
};

function stopAll() {
  tracks.forEach(t => {
    if (t.source) {
      try { t.source.stop(); } catch {}
      t.source.disconnect();
    }
    if (t.gainNode) t.gainNode.disconnect();
    t.source = null;
    t.gainNode = null;
  });
}

function playAll(offset = 0) {
  ensureAudioContext();
  stopAll();

  startTime = audioCtx.currentTime - offset;

  // On ne joue que CORE + pistes fusionnées
  const toPlay = tracks.filter(t => t.isBase || t.isMerged);

  toPlay.forEach(t => {
    const src = audioCtx.createBufferSource();
    src.buffer = t.buffer;

    const gain = audioCtx.createGain();
    gain.gain.value = t.volume;

    src.connect(gain);
    gain.connect(masterGain);

    src.start(0, offset);

    t.source = src;
    t.gainNode = gain;
  });
}

playPauseBtn.onclick = () => {
  if (!audioCtx) ensureAudioContext();

  if (!isPlaying) {
    playAll(pauseTime);
    isPlaying = true;
    playPauseBtn.textContent = "Pause";
    playStatus.textContent = "Lecture en cours.";
  } else {
    pauseTime = audioCtx.currentTime - startTime;
    stopAll();
    isPlaying = false;
    playPauseBtn.textContent = "Lecture";
    playStatus.textContent = "En pause.";
  }
};

recordBtn.onclick = () => {
  if (!mediaRecorder) return;
  if (mediaRecorder.state === "inactive") {
    recordedChunks = [];
    mediaRecorder.start();
    recordStatus.textContent = "Enregistrement...";
  } else {
    mediaRecorder.stop();
    recordStatus.textContent = "Arrêt de l'enregistrement...";
  }
};

exportBtn.onclick = () => {
  if (!recordedChunks.length) return;
  const blob = new Blob(recordedChunks, { type: "audio/webm" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "mix.webm";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
