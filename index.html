<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song360 Fusion Mixer</title>
<link rel="icon" href="favicon.png">

<style>
body{
 margin:0;
 background:radial-gradient(circle,#020617,#000);
 color:white;
 font-family:Arial;
 text-align:center;
}

h1{
 margin:15px;
 color:#38bdf8;
 text-shadow:0 0 10px #38bdf8;
}

#container{
 position:relative;
 width:650px;
 height:500px;
 margin:auto;
 border-radius:20px;
 box-shadow:inset 0 0 40px rgba(56,189,248,0.1);
 overflow:hidden;
}

/* CORE */
#core{
 position:absolute;
 top:210px;
 left:285px;
 width:80px;
 height:80px;
 border-radius:50%;
 background:orange;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:bold;
 box-shadow:0 0 20px orange;
}

/* BUBBLES */
.bubble{
 position:absolute;
 width:70px;
 height:70px;
 border-radius:50%;
 background:linear-gradient(45deg,#38bdf8,#0ea5e9);
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:grab;
 user-select:none;
 box-shadow:0 0 15px #38bdf8;
}

.bubble.active{
 box-shadow:0 0 25px lime;
 transform:scale(1.1);
}

/* PANEL */
#panel{
 margin-top:10px;
}
button{
 margin:5px;
 padding:8px;
 border:none;
 cursor:pointer;
 background:#38bdf8;
 color:black;
 font-weight:bold;
 border-radius:8px;
}
</style>
</head>

<body>

<h1>🎧 Song360 Fusion Mixer</h1>

<input type="file" id="fileInput" accept="audio/*">

<div id="container">
 <div id="core">CORE</div>
</div>

<div id="panel">
 <button onclick="startRec()">🎙 Record</button>
 <button onclick="stopRec()">💾 Download MP3</button>
</div>

<script>
const container=document.getElementById("container");
const core=document.getElementById("core");
const fileInput=document.getElementById("fileInput");

let bubbles=[];
let audios=[];

/* AUDIO CONTEXT */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const master = ctx.createGain();
master.connect(ctx.destination);

/* RECORD */
let recorder, chunks=[];

/* CREATE BUBBLE */
fileInput.onchange = (e)=>{
 const file = e.target.files[0];
 const url = URL.createObjectURL(file);

 const audio = new Audio(url);
 audio.loop = false;

 const source = ctx.createMediaElementSource(audio);
 const gain = ctx.createGain();

 source.connect(gain);
 gain.connect(master);

 const bubble = document.createElement("div");
 bubble.className="bubble";
 bubble.innerText=bubbles.length+1;

 container.appendChild(bubble);

 const data = {
  el:bubble,
  audio,
  gain,
  loop:false,
  x:100+Math.random()*400,
  y:100+Math.random()*300
 };

 bubble.style.left=data.x+"px";
 bubble.style.top=data.y+"px";

 /* CLICK = PLAY + LOOP SWITCH */
 bubble.onclick = ()=>{
  audio.currentTime=0;
  audio.play();

  data.loop = !data.loop;
  audio.loop = data.loop;

  bubble.classList.toggle("active");
 };

 /* DRAG */
 let drag=false;

 bubble.onmousedown=(e)=>{
  drag=true;
 };

 document.onmousemove=(e)=>{
  if(!drag) return;

  const rect=container.getBoundingClientRect();

  data.x=e.clientX-rect.left;
  data.y=e.clientY-rect.top;

  bubble.style.left=data.x+"px";
  bubble.style.top=data.y+"px";

  checkFusion(data);
 };

 document.onmouseup=()=>drag=false;

 bubbles.push(data);
};

/* FUSION SYSTEM */
function checkFusion(b){
 bubbles.forEach(other=>{
  if(other===b) return;

  const dx=b.x-other.x;
  const dy=b.y-other.y;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<80){
   fuse(b,other);
  }
 });
}

/* FUSION EFFECT */
function fuse(a,b){
 a.gain.gain.value += 0.2;
 b.gain.gain.value += 0.2;

 core.style.transform="scale(1.2)";
 setTimeout(()=>core.style.transform="scale(1)",200);
}

/* RECORD AUDIO */
function startRec(){
 chunks=[];
 recorder = new MediaRecorder(master.context?.destination?.stream || []);

 recorder.ondataavailable = e=>chunks.push(e.data);
 recorder.start();

 alert("Recording...");
}

function stopRec(){
 recorder.stop();

 recorder.onstop=()=>{
  const blob = new Blob(chunks,{type:"audio/webm"});
  const url = URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="song360_mix.mp3"; // navigateur = webm mais rename mp3
  a.click();
 };
}
</script>

</body>
</html>
