<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="favicon.png" type="image/png">
<meta charset="UTF-8">
<title>Song Fusion Mixer 360 PRO</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: radial-gradient(circle at center, #020617, #000);
    color: white;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== TITLE ===== */
h1 {
    margin: 6px;
    font-size: 18px;
    color: #38bdf8;
    text-shadow: 0 0 10px #38bdf8;
}

/* ===== MAIN LAYOUT ===== */
#main {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 18px;
    width: 100%;
    height: 62vh;
}

/* ===== MIXER ===== */
#container {
    position: relative;
    width: 420px;
    height: 420px;
    transform: scale(0.95);
}

#center {
    position: absolute;
    top: 170px;
    left: 170px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #fb923c, #ea580c);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    box-shadow: 0 0 25px #f97316;
    transition: 0.2s;
}

/* ===== BUBBLES ===== */
.bubble {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle, #38bdf8, #0ea5e9);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    box-shadow: 0 0 12px #38bdf8;
    font-size: 12px;
}

/* ===== VISUALIZER ===== */
#visualizer {
    width: 320px;
    height: 120px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
}

/* ===== CONTROLS ===== */
#controls {
    width: 100%;
    height: 110px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

/* ===== EQ SLIDERS ===== */
.eq {
    width: 55px;
    height: 90px;
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
}

/* ===== BUTTONS ===== */
button {
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
    font-size: 12px;
}

/* ===== INPUT ===== */
input[type="file"] {
    font-size: 12px;
}
</style>
</head>

<body>

<h1>🎧 Song Fusion Mixer 360 PRO</h1>

<input type="file" id="fileInput" accept="audio/*">

<div id="main">

    <div id="container">
        <div id="center">CORE</div>
    </div>

    <canvas id="visualizer" width="320" height="120"></canvas>

</div>

<div id="controls">
    <input type="range" id="bass" class="eq" min="-30" max="30" value="0">
    <input type="range" id="mid" class="eq" min="-30" max="30" value="0">
    <input type="range" id="treble" class="eq" min="-30" max="30" value="0">

    <button onclick="saveMix()">💾 Save</button>
    <button onclick="shareMix()">🌐 Share</button>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const container = document.getElementById("container");
const center = document.getElementById("center");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;

let bubbles = [];

let bass = audioCtx.createBiquadFilter();
bass.type = "lowshelf";
bass.frequency.value = 120;

let mid = audioCtx.createBiquadFilter();
mid.type = "peaking";
mid.frequency.value = 1000;

let treble = audioCtx.createBiquadFilter();
treble.type = "highshelf";
treble.frequency.value = 4000;

/* EQ */
document.getElementById("bass").oninput = e => bass.gain.value = e.target.value;
document.getElementById("mid").oninput = e => mid.gain.value = e.target.value;
document.getElementById("treble").oninput = e => treble.gain.value = e.target.value;

/* FILE */
fileInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const audio = new Audio(URL.createObjectURL(file));
    audio.loop = true;

    let source = audioCtx.createMediaElementSource(audio);

    source
        .connect(bass)
        .connect(mid)
        .connect(treble)
        .connect(analyser)
        .connect(audioCtx.destination);

    audio.play();
    center.innerText = "CORE 🔊";

    createBubble(audio);
    visualizer();
});

/* BUBBLE */
function createBubble(audio) {
    const b = document.createElement("div");
    b.className = "bubble";
    b.innerText = bubbles.length + 1;

    container.appendChild(b);
    bubbles.push(b);

    update();
    drag(b, audio);
}

/* POSITION */
function update() {
    const r = 150;
    const step = (Math.PI * 2) / bubbles.length;

    bubbles.forEach((b,i)=>{
        let a = i * step;
        b.style.left = 180 + Math.cos(a)*r + "px";
        b.style.top = 180 + Math.sin(a)*r + "px";
    });
}

/* DRAG */
function drag(el, audio) {
    let move = false;

    el.onmousedown = () => move = true;

    document.onmousemove = e => {
        if (!move) return;
        el.style.left = e.pageX + "px";
        el.style.top = e.pageY + "px";
    };

    document.onmouseup = () => {
        move = false;
        audio.play();
    };
}

/* VISUALIZER */
function visualizer() {
    let data = new Uint8Array(analyser.frequencyBinCount);

    function draw() {
        requestAnimationFrame(draw);

        analyser.getByteFrequencyData(data);

        ctx.clearRect(0,0,320,120);

        for (let i=0;i<data.length;i++) {
            let h = data[i];
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(i*3, 120-h, 2, h);
        }
    }

    draw();
}

/* SAVE */
function saveMix() {
    const mix = {
        bass: bass.gain.value,
        mid: mid.gain.value,
        treble: treble.gain.value
    };

    localStorage.setItem("song360", JSON.stringify(mix));
    alert("Mix sauvegardé 💾");
}

/* SHARE */
function shareMix() {
    const mix = {
        b: bass.gain.value,
        m: mid.gain.value,
        t: treble.gain.value
    };

    const url = btoa(JSON.stringify(mix));
    const link = window.location.origin + "?mix=" + url;

    navigator.clipboard.writeText(link);
    alert("Lien copié 🌐");
}

/* LOAD SHARE */
window.onload = () => {
    const p = new URLSearchParams(location.search).get("mix");
    if (!p) return;

    const d = JSON.parse(atob(p));

    bass.gain.value = d.b;
    mid.gain.value = d.m;
    treble.gain.value = d.t;
};
</script>

</body>
</html>
