<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song 360 Fusion Mixer PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #05070f;
  color: white;
  overflow: hidden;
}

/* VINYLE */
#vinyl {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, #222 10%, #000 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 12s linear infinite;
  opacity: 0.2;
  z-index: 0;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* TOP BAR */
#topbar {
  position: relative;
  z-index: 3;
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0f1629;
}

button {
  background: #2b6cff;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* CENTER */
#canvas {
  position: relative;
  height: calc(100vh - 160px);
  z-index: 2;
}

/* BUBBLES */
.bubble {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #2b6cff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  user-select: none;
  transition: 0.2s;
}

.bubble.merged {
  background: #ffcc00;
  transform: scale(1.2);
}

/* FX PANEL */
#effects {
  position: absolute;
  right: 0;
  top: 60px;
  width: 220px;
  height: calc(100vh - 160px);
  background: #0f1629;
  z-index: 3;
  padding: 10px;
}

.effect {
  margin: 10px 0;
  padding: 8px;
  background: #1b2a4a;
  border-radius: 8px;
  cursor: pointer;
}

/* BOTTOM */
#bottom {
  height: 80px;
  background: #0f1629;
  display: flex;
  overflow-x: auto;
  align-items: center;
  padding: 10px;
  position: relative;
  z-index: 3;
}

.track {
  margin-right: 15px;
}
</style>
</head>

<body>

<div id="vinyl"></div>

<!-- TOP -->
<div id="topbar">
  <div>
    <button onclick="document.getElementById('file').click()">➕ Ajouter son</button>
    <button onclick="playMix()">▶ Play</button>
    <button onclick="pauseMix()">⏸ Pause</button>
    <button onclick="startRecord()">⏺ Record</button>
    <button onclick="downloadMix()">⬇ Export</button>
    <input type="file" id="file" multiple hidden>
  </div>
  <div>🎧 SONG 360 PRO AUDIO</div>
</div>

<!-- CENTER -->
<div id="canvas"></div>

<!-- FX -->
<div id="effects">
  <h3>🎛 FX</h3>
  <div class="effect" onclick="setFX('echo')">Echo</div>
  <div class="effect" onclick="setFX('filter')">Low Pass</div>
  <div class="effect" onclick="setFX('reverb')">Reverb</div>
  <div class="effect" onclick="setFX('none')">Clean</div>
</div>

<!-- BOTTOM -->
<div id="bottom"></div>

<script>

/* =========================
   🔊 AUDIO ENGINE PRO
========================= */

let ctx = new AudioContext();

/* MASTER CLEAN + LIMITER */
let master = ctx.createGain();
master.gain.value = 0.85;

let compressor = ctx.createDynamicsCompressor();
compressor.threshold.value = -18;
compressor.knee.value = 30;
compressor.ratio.value = 10;
compressor.attack.value = 0.003;
compressor.release.value = 0.25;

master.connect(compressor);
compressor.connect(ctx.destination);

/* RECORD */
let dest = ctx.createMediaStreamDestination();
master.connect(dest);
let recorder;

/* DATA */
let buffers = [];
let bubbles = [];
let currentFX = "none";

/* FILE LOAD */
document.getElementById("file").onchange = e=>{
  [...e.target.files].forEach(loadAudio);
};

function loadAudio(file){
  let reader = new FileReader();

  reader.onload = async e=>{
    let buffer = await ctx.decodeAudioData(e.target.result);

    buffers.push(buffer);
    createBubble(file.name, buffer);
  };

  reader.readAsArrayBuffer(file);
}

/* =========================
   🫧 BUBBLES
========================= */

function createBubble(name, buffer){
  let div = document.createElement("div");
  div.className = "bubble";
  div.innerText = "🎵";

  div.style.left = Math.random()*500 + "px";
  div.style.top = Math.random()*300 + "px";

  let dragging = false;

  div.onmousedown = ()=> dragging = true;
  document.onmouseup = ()=> dragging = false;

  document.onmousemove = e=>{
    if(!dragging) return;

    div.style.left = e.pageX + "px";
    div.style.top = e.pageY + "px";

    checkFusion(div, buffer);
  };

  canvas.appendChild(div);

  bubbles.push({div, buffer});
}

/* =========================
   🔥 FUSION SYSTEM
========================= */

function checkFusion(activeDiv, activeBuffer){
  bubbles.forEach(b=>{

    if(b.div === activeDiv) return;

    let a = activeDiv.getBoundingClientRect();
    let c = b.div.getBoundingClientRect();

    let dx = a.left - c.left;
    let dy = a.top - c.top;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 70){
      mergeBuffers(activeBuffer, b.buffer);

      activeDiv.classList.add("merged");
      b.div.classList.add("merged");
    }
  });
}

/* 🔥 PRO CROSSFADE MIX */
function mergeBuffers(buf1, buf2){

  let length = Math.max(buf1.length, buf2.length);

  let out = ctx.createBuffer(2, length, ctx.sampleRate);

  for(let c=0;c<2;c++){

    let a = buf1.getChannelData(0);
    let b = buf2.getChannelData(0);
    let o = out.getChannelData(c);

    for(let i=0;i<length;i++){

      let t = i / length;

      // 🎧 smooth DJ crossfade
      let fadeA = Math.cos(t * Math.PI * 0.5);
      let fadeB = Math.sin(t * Math.PI * 0.5);

      o[i] = (a[i] || 0) * fadeA + (b[i] || 0) * fadeB;
    }
  }

  buffers = buffers.filter(x => x !== buf1 && x !== buf2);
  buffers.push(out);
}

/* =========================
   ▶ PLAY MIX
========================= */

function playMix(){
  ctx.resume();

  let start = ctx.currentTime + 0.1;

  buffers.forEach(b=>{
    let src = ctx.createBufferSource();
    src.buffer = b;

    let gain = ctx.createGain();
    gain.gain.value = 0.8;

    src.connect(gain);
    gain.connect(master);

    src.start(start);
  });
}

/* =========================
   ⏸ PAUSE
========================= */

function pauseMix(){
  ctx.suspend();
}

/* =========================
   ⏺ RECORD
========================= */

function startRecord(){
  recorder = new MediaRecorder(dest.stream);
  recorder.start();

  recorder.ondataavailable = e=>{
    window.recBlob = e.data;
    window.recURL = URL.createObjectURL(e.data);
  };
}

/* =========================
   ⬇ EXPORT
========================= */

function downloadMix(){
  if(!window.recBlob) return alert("No recording");

  let a = document.createElement("a");
  a.href = window.recURL;
  a.download = "song360_mix.webm";
  a.click();
}

/* =========================
   FX (placeholder ready)
========================= */

function setFX(type){
  currentFX = type;
}

</script>

</body>
</html>
