<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Song 360 Fusion Mixer</title></title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      display: flex;
      height: 100vh;
      background: #111;
      color: #f5f5f5;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    .controls-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      background: #2b6cb0;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled {
      background: #555;
      cursor: default;
    }
    .bubble-container {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #333;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
      overflow-y: auto;
      background: radial-gradient(circle at top left, #1f2933, #050608);
    }
    .bubble {
      min-width: 140px;
      max-width: 180px;
      padding: 10px;
      border-radius: 20px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.5);
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      user-select: none;
      cursor: grab;
    }
    .bubble.core {
      cursor: default;
    }
    .bubble.dragging {
      opacity: 0.4;
    }
    .core-highlight {
      border: 2px solid #00ff99 !important;
      box-shadow: 0 0 10px #00ff99;
    }
    .bubble-title {
      font-weight: 600;
      text-align: center;
    }
    .volume-row {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .volume-row label {
      font-size: 11px;
      opacity: 0.8;
    }
    .side-panel {
      width: 260px;
      border-left: 1px solid #333;
      padding: 16px;
      box-sizing: border-box;
      background: #050608;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .panel-section {
      border-radius: 8px;
      border: 1px solid #333;
      padding: 10px;
      background: #111827;
    }
    .panel-section h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca3af;
    }
    .status {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="main">
    <header><h1>Mixer Audio</h1></header>

    <div class="controls-row">
      <div>
        <label>Son de base :</label>
        <input type="file" id="baseSound" accept="audio/*">
      </div>

      <div>
        <label>Ajouter MP3 :</label>
        <input type="file" id="addTrack" accept="audio/*" multiple>
      </div>

      <div>
        <button id="playPauseBtn" disabled>Lecture</button>
        <button id="recordBtn" disabled>Enregistrer</button>
        <button id="exportBtn" disabled>Exporter MP3</button>
      </div>
    </div>

    <div class="bubble-container" id="bubbleContainer"></div>
  </div>

  <aside class="side-panel">
    <div class="panel-section">
      <h2>Mix global</h2>
      <label>Volume CORE</label>
      <input type="range" id="coreVolume" min="0" max="1" step="0.01" value="1">
      <div class="status" id="playStatus">Aucun son chargé.</div>
    </div>

    <div class="panel-section">
      <h2>Effets audio</h2>
      <select id="effectSelect" size="10">
        <option>Reverb légère</option>
        <option>Reverb grande salle</option>
        <option>Echo court</option>
        <option>Echo long</option>
        <option>Chorus</option>
        <option>Flanger</option>
        <option>Phaser</option>
        <option>Distorsion douce</option>
        <option>Distorsion forte</option>
        <option>Filtre passe-bas</option>
        <option>Filtre passe-haut</option>
        <option>Compresseur</option>
        <option>Pitch +1 ton</option>
        <option>Pitch -1 ton</option>
        <option>Stéréo élargie</option>
      </select>
      <div class="status">Effets listés (structure prête pour Web Audio).</div>
    </div>

    <div class="panel-section">
      <h2>Enregistrement</h2>
      <div class="status" id="recordStatus">En attente.</div>
    </div>
  </aside>

  <!-- LAME.js pour encodage MP3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.0/lame.min.js"></script>

<script>
let audioCtx = null;
let coreGain = null;

let coreBuffer = null;      // buffer fusionné CORE
let coreSource = null;      // source en lecture
let isPlaying = false;
let startTime = 0;
let pauseTime = 0;

const tracks = [];          // pistes non fusionnées {id, name, buffer}
let draggedTrack = null;

let mp3Blob = null;

const baseInput = document.getElementById("baseSound");
const addInput = document.getElementById("addTrack");
const bubbleContainer = document.getElementById("bubbleContainer");
const playPauseBtn = document.getElementById("playPauseBtn");
const recordBtn = document.getElementById("recordBtn");
const exportBtn = document.getElementById("exportBtn");
const coreVolume = document.getElementById("coreVolume");
const playStatus = document.getElementById("playStatus");
const recordStatus = document.getElementById("recordStatus");

exportBtn.disabled = true;

function ensureAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    coreGain = audioCtx.createGain();
    coreGain.gain.value = coreVolume.value;
    coreGain.connect(audioCtx.destination);
  }
}

coreVolume.oninput = () => {
  if (coreGain) coreGain.gain.value = coreVolume.value;
};

async function fileToBuffer(file) {
  ensureAudioContext();
  const arrayBuffer = await file.arrayBuffer();
  return await audioCtx.decodeAudioData(arrayBuffer);
}

function createCoreBubble() {
  // Supprime l’ancienne bulle CORE si elle existe
  const oldCore = document.getElementById("core-bubble");
  if (oldCore) oldCore.remove();

  const bubble = document.createElement("div");
  bubble.className = "bubble core";
  bubble.id = "core-bubble";

  const title = document.createElement("div");
  title.className = "bubble-title";
  title.textContent = "CORE";

  const volumeRow = document.createElement("div");
  volumeRow.className = "volume-row";

  const label = document.createElement("label");
  label.textContent = "Volume CORE";

  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = 0;
  slider.max = 1;
  slider.step = 0.01;
  slider.value = coreVolume.value;

  slider.oninput = () => {
    coreVolume.value = slider.value;
    if (coreGain) coreGain.gain.value = slider.value;
  };

  volumeRow.appendChild(label);
  volumeRow.appendChild(slider);

  bubble.appendChild(title);
  bubble.appendChild(volumeRow);

  bubbleContainer.appendChild(bubble);

  enableCoreDrop(bubble);
}

function createTrackBubble(track) {
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.id = "bubble-" + track.id;

  const title = document.createElement("div");
  title.className = "bubble-title";
  title.textContent = track.name;

  bubble.appendChild(title);
  bubbleContainer.appendChild(bubble);

  enableDrag(bubble, track);
}

function enableDrag(bubble, track) {
  bubble.draggable = true;

  bubble.addEventListener("dragstart", () => {
    draggedTrack = track;
    bubble.classList.add("dragging");
  });

  bubble.addEventListener("dragend", () => {
    bubble.classList.remove("dragging");
    draggedTrack = null;
  });
}

function enableCoreDrop(coreBubble) {
  coreBubble.addEventListener("dragover", (e) => {
    e.preventDefault();
    coreBubble.classList.add("core-highlight");
  });

  coreBubble.addEventListener("dragleave", () => {
    coreBubble.classList.remove("core-highlight");
  });

  coreBubble.addEventListener("drop", async () => {
    coreBubble.classList.remove("core-highlight");
    if (!draggedTrack || !coreBuffer) return;

    await fuseTrackIntoCore(draggedTrack);

    const bubble = document.getElementById("bubble-" + draggedTrack.id);
    if (bubble) bubble.remove();

    const idx = tracks.findIndex(t => t.id === draggedTrack.id);
    if (idx !== -1) tracks.splice(idx, 1);

    playStatus.textContent = "Son fusionné dans CORE.";
  });
}

async function addBase(file) {
  coreBuffer = await fileToBuffer(file);
  createCoreBubble();
  playPauseBtn.disabled = false;
  recordBtn.disabled = false;
  playStatus.textContent = "CORE chargé.";
}

async function addTrack(file) {
  const buffer = await fileToBuffer(file);
  const track = {
    id: Math.random().toString(36).slice(2),
    name: file.name,
    buffer
  };
  tracks.push(track);
  createTrackBubble(track);
  playStatus.textContent = "Piste ajoutée (fusionne-la dans CORE pour l'entendre).";
}

baseInput.onchange = e => {
  const f = e.target.files[0];
  if (f) addBase(f);
};

addInput.onchange = e => {
  [...e.target.files].forEach(f => addTrack(f));
};

function stopCore() {
  if (coreSource) {
    try { coreSource.stop(); } catch {}
    coreSource.disconnect();
    coreSource = null;
  }
}

function playCore(offset = 0) {
  if (!coreBuffer) return;
  ensureAudioContext();
  stopCore();

  coreSource = audioCtx.createBufferSource();
  coreSource.buffer = coreBuffer;
  coreSource.connect(coreGain);
  startTime = audioCtx.currentTime - offset;
  coreSource.start(0, offset);
}

playPauseBtn.onclick = () => {
  if (!coreBuffer) return;
  ensureAudioContext();

  if (!isPlaying) {
    playCore(pauseTime);
    isPlaying = true;
    playPauseBtn.textContent = "Pause";
    playStatus.textContent = "Lecture CORE.";
  } else {
    pauseTime = audioCtx.currentTime - startTime;
    stopCore();
    isPlaying = false;
    playPauseBtn.textContent = "Lecture";
    playStatus.textContent = "En pause.";
  }
};

// Fusion réelle : mixage offline de CORE + piste
async function fuseTrackIntoCore(track) {
  if (!coreBuffer || !track.buffer) return;

  const sampleRate = coreBuffer.sampleRate;
  const length = Math.max(coreBuffer.length, track.buffer.length);

  const offlineCtx = new OfflineAudioContext(1, length, sampleRate);

  const coreSrc = offlineCtx.createBufferSource();
  coreSrc.buffer = coreBuffer;
  coreSrc.connect(offlineCtx.destination);
  coreSrc.start(0);

  const trackSrc = offlineCtx.createBufferSource();
  trackSrc.buffer = track.buffer;
  trackSrc.connect(offlineCtx.destination);
  trackSrc.start(0);

  const rendered = await offlineCtx.startRendering();
  coreBuffer = rendered;
  pauseTime = 0;
}

// Encodage MP3 192 kbps via lamejs
function encodeCoreToMp3() {
  if (!coreBuffer) return null;

  const numChannels = coreBuffer.numberOfChannels;
  const sampleRate = coreBuffer.sampleRate;
  const left = coreBuffer.getChannelData(0);
  let samples = left;

  if (numChannels > 1) {
    const right = coreBuffer.getChannelData(1);
    const len = left.length;
    const mixed = new Float32Array(len);
    for (let i = 0; i < len; i++) {
      mixed[i] = (left[i] + right[i]) / 2;
    }
    samples = mixed;
  }

  const mp3Encoder = new lamejs.Mp3Encoder(1, sampleRate, 192);
  const blockSize = 1152;
  const mp3Data = [];

  let i = 0;
  while (i < samples.length) {
    const chunk = samples.subarray(i, i + blockSize);
    const buffer = new Int16Array(chunk.length);
    for (let j = 0; j < chunk.length; j++) {
      let s = Math.max(-1, Math.min(1, chunk[j]));
      buffer[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    const mp3buf = mp3Encoder.encodeBuffer(buffer);
    if (mp3buf.length > 0) mp3Data.push(mp3buf);
    i += blockSize;
  }

  const end = mp3Encoder.flush();
  if (end.length > 0) mp3Data.push(end);

  return new Blob(mp3Data, { type: "audio/mpeg" });
}

recordBtn.onclick = () => {
  if (!coreBuffer) {
    recordStatus.textContent = "Aucun CORE à enregistrer.";
    return;
  }
  recordStatus.textContent = "Encodage MP3 en cours...";
  setTimeout(() => {
    mp3Blob = encodeCoreToMp3();
    if (mp3Blob) {
      recordStatus.textContent = "MP3 prêt. Clique sur Exporter.";
      exportBtn.disabled = false;
    } else {
      recordStatus.textContent = "Erreur encodage MP3.";
    }
  }, 10);
};

exportBtn.onclick = () => {
  if (!mp3Blob) return;
  const url = URL.createObjectURL(mp3Blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "mix_core.mp3";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
