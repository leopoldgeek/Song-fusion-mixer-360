<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song 360 Studio</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  margin: 0;
  background: #05070f;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* VINYL */
#vinyl {
  position: absolute;
  width: 700px;
  height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, #222 10%, #000 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: spin 12s linear infinite;
  opacity: 0.2;
  z-index: 0;
}

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* TOP */
#topbar {
  position: relative;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #0f1629;
}

button {
  background: #2b6cff;
  border: none;
  padding: 8px 10px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 5px;
}

/* CANVAS */
#canvas {
  position: relative;
  height: calc(100vh - 160px);
  z-index: 2;
}

/* TRACK */
.track {
  position: absolute;
  width: 120px;
  height: 70px;
  background: #1b2a4a;
  border-radius: 10px;
  padding: 5px;
  font-size: 11px;
  cursor: grab;
}

/* LIBRARY */
#library {
  position: absolute;
  right: 0;
  top: 0;
  width: 260px;
  height: 100vh;
  background: #0f1629;
  overflow-y: auto;
  padding: 10px;
  z-index: 10;
}

.sample {
  padding: 8px;
  margin: 6px 0;
  background: #1b2a4a;
  border-radius: 8px;
  cursor: pointer;
}

.sample:hover {
  background: #2b6cff;
}

/* BOTTOM */
#bottom {
  height: 80px;
  background: #0f1629;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 12px;
  z-index: 5;
  position: relative;
}

.eq {
  font-size: 11px;
  display: flex;
  flex-direction: column;
}

input[type=range] {
  width: 110px;
}
</style>
</head>

<body>

<div id="vinyl"></div>

<!-- TOP -->
<div id="topbar">
  <div>
    <button onclick="file.click()">➕ Add</button>
    <button onclick="playAll()">▶ Play</button>
    <button onclick="pauseAll()">⏸</button>
    <button onclick="exportWAV()">⬇ WAV</button>
    <button onclick="saveProject()">💾 .song360</button>
    <button onclick="loadProject()">📂 Load</button>
  </div>
  <div>🎧 SONG 360 Fusion Mixer</div>
</div>

<!-- CENTER -->
<div id="canvas"></div>

<!-- LIBRARY -->
<div id="library"></div>

<!-- BOTTOM -->
<div id="bottom">

  <div class="eq">
    Bass
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('bass',this.value)">
  </div>

  <div class="eq">
    Mid
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('mid',this.value)">
  </div>

  <div class="eq">
    Treble
    <input type="range" min="-40" max="20" value="0" oninput="setEQ('treble',this.value)">
  </div>

  <div class="eq">
    BPM
    <input type="range" min="60" max="180" value="120" oninput="setBPM(this.value)">
  </div>

  <div class="eq">
    Pitch
    <input type="range" min="0.5" max="2" step="0.01" value="1" oninput="setPitch(this.value)">
  </div>

</div>

<input type="file" id="file" multiple hidden>

<script>

/* =========================
   AUDIO ENGINE
========================= */

const ctx = new AudioContext();

const master = ctx.createGain();
master.gain.value = 0.85;

const comp = ctx.createDynamicsCompressor();
comp.threshold.value = -18;
comp.ratio.value = 10;

master.connect(comp);
comp.connect(ctx.destination);

/* EQ */
const bass = ctx.createBiquadFilter();
bass.type = "lowshelf";
bass.frequency.value = 200;

const mid = ctx.createBiquadFilter();
mid.type = "peaking";
mid.frequency.value = 1000;

const treble = ctx.createBiquadFilter();
treble.type = "highshelf";
treble.frequency.value = 3000;

master.connect(bass);
bass.connect(mid);
mid.connect(treble);
treble.connect(comp);

/* DATA */
let tracks = [];
let samples = [];
let gainNodes = [];

let BPM = 120;
let pitch = 1;

/* FILE INPUT */
file.onchange = async e=>{
  for(let f of e.target.files){
    let buf = await f.arrayBuffer();
    let audio = await ctx.decodeAudioData(buf);
    createTrack(f.name, audio);
  }
};

/* =========================
   TRACK
========================= */

function createTrack(name, buffer){

  let id = samples.length;

  samples.push({name, buffer});

  let gain = ctx.createGain();
  gain.gain.value = 0.8;
  gainNodes[id] = gain;

  let div = document.createElement("div");
  div.className = "track";
  div.innerText = name;

  div.style.left = Math.random()*400 + "px";
  div.style.top = Math.random()*200 + "px";

  div.onclick = ()=> preview(id, div);

  canvas.appendChild(div);

  tracks.push({buffer, id, div});

  let item = document.createElement("div");
  item.className = "sample";

  item.innerHTML = `
    <div>${name}</div>
    <input type="range" min="0" max="2" step="0.01" value="0.8">
  `;

  item.querySelector("input").oninput = e=>{
    gainNodes[id].gain.value = e.target.value;
  };

  item.onclick = ()=> preview(id, div);

  library.appendChild(item);
}

/* =========================
   PREVIEW
========================= */

function preview(id, div){

  let s = samples[id];
  if(!s) return;

  let src = ctx.createBufferSource();
  src.buffer = s.buffer;
  src.playbackRate.value = pitch;

  let g = ctx.createGain();
  g.gain.value = gainNodes[id]?.gain.value || 0.8;

  src.connect(g);
  g.connect(master);

  src.start();

  div.style.transform = "scale(1.3)";
  div.style.boxShadow = "0 0 20px #2b6cff";

  setTimeout(()=>{
    div.style.transform = "scale(1)";
    div.style.boxShadow = "none";
  },300);
}

/* =========================
   PLAY / PAUSE
========================= */

function playAll(){
  ctx.resume();

  let start = ctx.currentTime + 0.1;

  tracks.forEach((t,i)=>{

    let src = ctx.createBufferSource();
    src.buffer = t.buffer;
    src.playbackRate.value = pitch;

    let g = gainNodes[t.id];

    src.connect(g);
    g.connect(master);

    src.start(start + i*0.1);
  });
}

function pauseAll(){
  ctx.suspend();
}

/* =========================
   CONTROLS
========================= */

function setEQ(type,v){
  v = Number(v);
  if(type==="bass") bass.gain.value = v;
  if(type==="mid") mid.gain.value = v;
  if(type==="treble") treble.gain.value = v;
}

function setBPM(v){ BPM = Number(v); }
function setPitch(v){ pitch = Number(v); }

/* =========================
   SAVE .song360
========================= */

async function saveProject(){

  let data = [];

  for(let i=0;i<tracks.length;i++){

    let t = tracks[i];

    let buffer = samples[t.id].buffer;

    let wav = bufferToWav(buffer);
    let base64 = await new Promise(res=>{
      let reader = new FileReader();
      reader.onload = ()=> res(reader.result);
      reader.readAsDataURL(new Blob([wav]));
    });

    data.push({
      name: samples[t.id].name,
      audio: base64,
      volume: gainNodes[t.id].gain.value
    });
  }

  let project = {
    bpm: BPM,
    pitch: pitch,
    tracks: data
  };

  let blob = new Blob([JSON.stringify(project)], {type:"application/json"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "project.song360";
  a.click();
}

/* =========================
   LOAD .song360
========================= */

function loadProject(){

  let inp = document.createElement("input");
  inp.type = "file";

  inp.onchange = async e=>{

    let file = e.target.files[0];
    let text = await file.text();
    let project = JSON.parse(text);

    BPM = project.bpm;
    pitch = project.pitch;

    tracks = [];
    samples = [];
    gainNodes = [];

    canvas.innerHTML = "";
    library.innerHTML = "";

    for(let t of project.tracks){

      let audioData = await fetch(t.audio).then(r=>r.arrayBuffer());
      let buffer = await ctx.decodeAudioData(audioData);

      let id = samples.length;

      samples.push({name:t.name, buffer});

      let gain = ctx.createGain();
      gain.gain.value = t.volume;
      gainNodes[id] = gain;

      createTrack(t.name, buffer);
    }

    alert("🎧 Project loaded");
  };

  inp.click();
}

/* =========================
   WAV EXPORT
========================= */

function exportWAV(){

  const length = ctx.sampleRate * 60;

  const offline = new OfflineAudioContext(2, length, ctx.sampleRate);

  const master = offline.createGain();
  master.gain.value = 0.85;

  const comp = offline.createDynamicsCompressor();
  comp.threshold.value = -18;
  comp.ratio.value = 10;

  master.connect(comp);
  comp.connect(offline.destination);

  let start = 0;

  tracks.forEach(t=>{

    let src = offline.createBufferSource();
    src.buffer = t.buffer;
    src.playbackRate.value = pitch;

    let g = offline.createGain();
    g.gain.value = gainNodes[t.id]?.gain.value || 0.8;

    src.connect(g);
    g.connect(master);

    src.start(start);
    start += 0.1;
  });

  offline.startRendering().then(rendered=>{

    let wav = bufferToWav(rendered);
    let blob = new Blob([wav], {type:"audio/wav"});

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "song360.wav";
    a.click();
  });
}

/* WAV ENCODER */
function bufferToWav(buffer){

  let length = buffer.length * 4 + 44;
  let array = new ArrayBuffer(length);
  let view = new DataView(array);

  let offset = 0;

  function write(s){
    for(let i=0;i<s.length;i++){
      view.setUint8(offset++, s.charCodeAt(i));
    }
  }

  write("RIFF");
  view.setUint32(offset, length-8,true); offset+=4;
  write("WAVEfmt ");
  view.setUint32(offset,16,true); offset+=4;
  view.setUint16(offset,1,true); offset+=2;
  view.setUint16(offset,2,true); offset+=2;
  view.setUint32(offset,buffer.sampleRate,true); offset+=4;
  view.setUint32(offset,buffer.sampleRate*4,true); offset+=4;
  view.setUint16(offset,4,true); offset+=2;
  view.setUint16(offset,16,true); offset+=2;

  write("data");
  view.setUint32(offset,length-offset-4,true); offset+=4;

  let ch0 = buffer.getChannelData(0);
  let ch1 = buffer.getChannelData(1)||ch0;

  for(let i=0;i<buffer.length;i++){
    view.setInt16(offset,ch0[i]*0x7fff,true); offset+=2;
    view.setInt16(offset,ch1[i]*0x7fff,true); offset+=2;
  }

  return array;
}

</script>

</body>
</html>
