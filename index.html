<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Song 360 Fusion Mixer</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  overflow: hidden;
}

/* TOP BAR */
#topbar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: #11182b;
}

button {
  background: #2b6cff;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-right: 5px;
}

/* CENTER */
#workspace {
  display: flex;
  height: calc(100vh - 140px);
}

#canvas {
  flex: 1;
  position: relative;
  background: radial-gradient(circle, #1b2a4a, #05070f);
  overflow: hidden;
}

.bubble {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: #2b6cff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  user-select: none;
}

/* RIGHT EFFECTS */
#effects {
  width: 220px;
  background: #0f1629;
  padding: 10px;
}

.effect {
  margin: 10px 0;
  padding: 8px;
  background: #1b2a4a;
  border-radius: 8px;
}

/* BOTTOM VOLUME */
#bottom {
  height: 80px;
  background: #11182b;
  display: flex;
  align-items: center;
  overflow-x: auto;
  padding: 10px;
}

.track {
  margin-right: 15px;
}
</style>
</head>
<body>

<!-- TOP -->
<div id="topbar">
  <div>
    <button onclick="playAll()">▶ Play</button>
    <button onclick="pauseAll()">⏸ Pause</button>
    <button onclick="startRecord()">⏺ Record</button>
    <button onclick="downloadMix()">⬇ Download</button>
  </div>
  <div>🎧 Song 360 Fusion Mixer</div>
</div>

<!-- MAIN -->
<div id="workspace">

  <!-- CENTER -->
  <div id="canvas"></div>

  <!-- EFFECTS -->
  <div id="effects">
    <h3>🎛 Effets</h3>
    <div class="effect">Reverb</div>
    <div class="effect">Bass Boost</div>
    <div class="effect">Echo</div>
    <div class="effect">Distortion</div>
    <div class="effect">Low Pass</div>
  </div>
</div>

<!-- BOTTOM -->
<div id="bottom"></div>

<script>
const canvas = document.getElementById("canvas");
const bottom = document.getElementById("bottom");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let sources = [];
let gainNodes = [];
let recorder;
let dest = audioCtx.createMediaStreamDestination();

/* ADD SAMPLE BUBBLE */
function addAudio(file) {
  const reader = new FileReader();

  reader.onload = function(e) {
    audioCtx.decodeAudioData(e.target.result, buffer => {

      let source = audioCtx.createBufferSource();
      source.buffer = buffer;

      let gain = audioCtx.createGain();
      gain.gain.value = 1;

      source.connect(gain);
      gain.connect(audioCtx.destination);
      gain.connect(dest);

      sources.push(source);
      gainNodes.push(gain);

      createBubble(file.name, source, gain);
      createVolumeControl(gain, file.name);
    });
  };

  reader.readAsArrayBuffer(file);
}

/* BUBBLE */
function createBubble(name, source, gain) {
  let div = document.createElement("div");
  div.className = "bubble";
  div.innerText = name.slice(0,6);

  div.style.left = Math.random()*400 + "px";
  div.style.top = Math.random()*300 + "px";

  let isDragging = false;

  div.onmousedown = () => isDragging = true;
  document.onmouseup = () => isDragging = false;

  document.onmousemove = (e) => {
    if(isDragging){
      div.style.left = e.pageX + "px";
      div.style.top = e.pageY + "px";
    }
  };

  div.ondblclick = () => {
    // fusion = boost volume
    gain.gain.value += 0.3;
  };

  canvas.appendChild(div);
}

/* VOLUME CONTROL */
function createVolumeControl(gain, name){
  let div = document.createElement("div");
  div.className = "track";

  div.innerHTML = `
    <div>${name.slice(0,10)}</div>
    <input type="range" min="0" max="2" step="0.01" value="1">
  `;

  let slider = div.querySelector("input");
  slider.oninput = () => {
    gain.gain.value = slider.value;
  };

  bottom.appendChild(div);
}

/* PLAY */
function playAll(){
  audioCtx.resume();
  sources.forEach(s => {
    try { s.start(); } catch(e){}
  });
}

/* PAUSE */
function pauseAll(){
  audioCtx.suspend();
}

/* RECORD */
function startRecord(){
  recorder = new MediaRecorder(dest.stream);
  recorder.start();
  recorder.ondataavailable = e => {
    let url = URL.createObjectURL(e.data);
    window.recordedBlob = e.data;
    window.recordedURL = url;
  };
}

/* DOWNLOAD */
function downloadMix(){
  if(!window.recordedBlob) return alert("Pas encore enregistré !");
  let a = document.createElement("a");
  a.href = window.recordedURL;
  a.download = "song360_mix.webm";
  a.click();
}

/* DROP FILE */
document.body.ondragover = e => e.preventDefault();
document.body.ondrop = e => {
  e.preventDefault();
  [...e.dataTransfer.files].forEach(addAudio);
};
</script>

</body>
</html>
